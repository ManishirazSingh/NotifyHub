services:
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka

    ports:
      - "${KAFKA_PORT}:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

    depends_on:
      - kafka

  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped
  
  postgres:
    image: postgres:17
    container_name: postgres

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service

    container_name: notification-service

    ports:
      - "${NOTIFICATION_PORT}:8081"

    depends_on:
      - postgres
      - kafka
      - redis

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notifyhub
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  email-service:
    build:
      context: ./email-service

    container_name: email-service

    ports:
      - "${EMAIL_PORT}:8082"

    depends_on:
      - kafka
      - redis

    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379  

  sms-service:
    build:
      context: ./sms-service
    container_name: sms-service

    ports:
      - "${SMS_PORT}:8083"
    depends_on:
      - kafka
      - redis 

    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

volumes:
  postgres-data: