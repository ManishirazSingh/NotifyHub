spring.application.name=email-service

server.port=8082

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=email-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.kafka.notification-topic=notification-events
app.kafka.notification-dlt-topic=notification-events-dlt
spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,info,metrics

management.endpoint.health.show-details=always

management.info.env.enabled=true

info.app.name=NotifyHub EMAIL Service
info.app.version=1.0.0
info.app.description=Email Notification Consumer service